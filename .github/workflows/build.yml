name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Install Theos
      run: |
        git clone --recursive https://github.com/theos/theos.git $HOME/theos
        echo "THEOS=$HOME/theos" >> $GITHUB_ENV
        
    - name: Setup iOS SDK
      run: |
        mkdir -p $HOME/theos/sdks
        # Symlink the default iOS SDK from Xcode on macOS runner
        ln -s /Applications/Xcode.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/iPhoneOS.sdk $HOME/theos/sdks/iPhoneOS.sdk
        
    - name: Build Package
      run: |
        export THEOS=$HOME/theos
        make package THEOS_PACKAGE_SCHEME=rootless
        
    - name: Upload DEB Artifact
      uses: actions/artifacts/upload@v3
      with:
        name: FreeFireMaxESP-deb
        path: packages/*.deb
