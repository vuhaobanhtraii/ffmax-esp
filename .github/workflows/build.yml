name: Build Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Theos
      uses: Randomblock1/theos-action@v1
      
    - name: Build Package
      run: |
        make package THEOS_PACKAGE_SCHEME=rootless > build.log 2>&1
        
    - name: Print Log on Failure
      if: failure()
      run: |
        LOG_CONTENT=$(cat build.log)
        # Escape characters for multiline GH actions output
        LOG_CONTENT="${LOG_CONTENT//'%'/'%25'}"
        LOG_CONTENT="${LOG_CONTENT//$'\n'/'%0A'}"
        LOG_CONTENT="${LOG_CONTENT//$'\r'/'%0D'}"
        echo "::error file=Tweak.xm,line=1::Build failed. Log:%0A$LOG_CONTENT"
        exit 1
        
    - name: Upload DEB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FreeFireMaxESP-deb
        path: packages/*.deb
